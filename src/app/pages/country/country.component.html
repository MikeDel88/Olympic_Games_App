<div>
  <div>
    <app-header [titlePage]="titlePage" [infos]="[
      { label: 'Number of entries', count: totalEntries },
      { label: 'Total Number of medals', count: totalMedals },
      { label: 'Total Number of athletes', count: totalAthletes }
    ]"/>
  </div>
  <div class="chart-container wrapper-container">
    <div class="container">
      <canvas id="countryChart">{{ lineChart }}</canvas>
      <h2>Date</h2>
    </div>
  </div>
  <div class="center">
    <a routerLink="/">Go back</a>
  </div>
</div>
