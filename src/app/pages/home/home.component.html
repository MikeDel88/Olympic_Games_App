<h2>Olympic games app</h2>
<hr/>
<div class="grid">
  <div class="col-full">
      <app-header
        titlePage="Medals per Country"
        [infos]="[
          { label: 'Number of countries', count: totalCountries },
          { label: 'Number of JOs', count: totalJOs }
        ]"
      />
  </div>
    @if(medalsChartDatas) {
      <app-medals-chart class="col-full col-desktop-8-center" [datas]="medalsChartDatas"/>
    }
</div>
